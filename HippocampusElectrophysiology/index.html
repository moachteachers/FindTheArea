<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זיהוי קולי למעבדה - היפוקמפוס</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rubik', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .controls-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        button {
            font-family: 'Rubik', sans-serif;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 30px;
            cursor: pointer;
            border: 2px solid #00d2ff;
            border-radius: 30px;
            background-color: rgba(26, 26, 46, 0.8);
            color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2), inset 0 0 10px rgba(0, 210, 255, 0.1);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        button:hover:not(:disabled) {
            background-color: #00d2ff;
            color: #1a1a2e;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
            transform: scale(1.05);
        }
        button:disabled {
            border-color: #444;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
            background-color: rgba(0, 0, 0, 0.2);
        }
        .display-board {
            background: rgba(26, 26, 46, 0.7);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #3a3a5a;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            width: 80%;
            max-width: 600px;
            backdrop-filter: blur(8px);
        }
        #wordDisplay {
            font-size: 70px;
            font-weight: bold;
            color: #444; 
            margin: 20px 0;
            min-height: 100px;
            transition: all 0.3s ease;
        }
        #status {
            font-size: 18px;
            font-weight: bold;
            color: #888;
            margin-top: 10px;
        }
        
        @keyframes pulse {
            0% { text-shadow: 0 0 10px #00d2ff; }
            50% { text-shadow: 0 0 20px #00d2ff, 0 0 30px #00d2ff; }
            100% { text-shadow: 0 0 10px #00d2ff; }
        }
        .listening-active {
            color: #00d2ff !important;
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <button id="connectBtn">1. התחברות למיקרוביט</button>
        <button id="startBtn" disabled>2. התחל האזנה</button>
    </div>
    
    <div class="display-board">
        <div id="wordDisplay">...</div>
        <div id="status">ממתין לחיבור USB...</div>
    </div>

    <script>
        let port;
        let writer;
        let isListening = false;
        let currentSendId = 0; 

        const targetWords = ["פיל", "נסיכה", "ערב", "מצלמה", "חיתול"];

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'he-IL'; 
        // שינוי לזיהוי רציף כדי למנוע את קפיצת חלון ההרשאה ולשפר את חווית השימוש
        recognition.continuous = true; 
        recognition.interimResults = false;

        const connectBtn = document.getElementById('connectBtn');
        const startBtn = document.getElementById('startBtn');
        const wordDisplay = document.getElementById('wordDisplay');
        const statusDiv = document.getElementById('status');

        connectBtn.addEventListener('click', async () => {
            try {
                const ports = await navigator.serial.getPorts();
                if (ports.length > 0) {
                    port = ports[0];
                } else {
                    port = await navigator.serial.requestPort();
                }
                
                await port.open({ baudRate: 115200 });
                
                const textEncoder = new TextEncoderStream();
                textEncoder.readable.pipeTo(port.writable);
                writer = textEncoder.writable.getWriter();
                
                statusDiv.innerText = "מחובר למיקרוביט בהצלחה!";
                statusDiv.style.color = "#00ffaa";
                startBtn.disabled = false;
                connectBtn.style.display = 'none';
            } catch (error) {
                console.error('שגיאת התחברות:', error);
                statusDiv.innerText = "הוציאו וחברו שוב את כבל ה-USB של המיקרוביט ונסו להתחבר שנית";
                statusDiv.style.color = "#ff003c";
            }
        });

        window.addEventListener('beforeunload', () => {
            if (writer) writer.releaseLock();
            if (port) port.close();
        });

        // שליחת האות 15 פעמים במרווחים של 100 מילישניות
        async function sendMultipleTimes(cmd) {
            currentSendId++; 
            const sendId = currentSendId; 
            
            for (let i = 0; i < 15; i++) {
                if (sendId !== currentSendId) break; 
                
                if (writer) {
                    try {
                        await writer.write(cmd + '\n');
                    } catch (e) {
                        console.error("שגיאה בשליחה:", e);
                    }
                }
                await new Promise(resolve => setTimeout(resolve, 100));
            }
        }

        startBtn.addEventListener('click', () => {
            if (!isListening) {
                try { recognition.start(); } catch(e) {}
                isListening = true;
                startBtn.innerText = "השהה האזנה";
                startBtn.style.borderColor = "#ff003c";
                startBtn.style.color = "#ff003c";
                statusDiv.innerText = "מאזין כעת... אמור מילה";
                statusDiv.classList.add("listening-active");
            } else {
                recognition.stop();
                isListening = false;
                startBtn.innerText = "2. התחל האזנה";
                startBtn.style.borderColor = "#00d2ff";
                startBtn.style.color = "#00d2ff";
                statusDiv.innerText = "ההאזנה הופסקה.";
                statusDiv.classList.remove("listening-active");
            }
        });

        recognition.onresult = (event) => {
            // בגלל שעברנו למצב רציף, אנחנו צריכים לקחת תמיד את התוצאה האחרונה שהתקבלה במערך
            const current = event.resultIndex;
            const word = event.results[current][0].transcript.trim();
            wordDisplay.innerText = word; 

            let found = false;
            for (let i = 0; i < targetWords.length; i++) {
                if (word.includes(targetWords[i])) {
                    found = true;
                    break;
                }
            }

            if (found) {
                sendMultipleTimes('S'); 
                wordDisplay.style.color = "#ff003c";
                wordDisplay.style.textShadow = "0 0 30px rgba(255, 0, 60, 0.8)";
            } else {
                sendMultipleTimes('C'); 
                wordDisplay.style.color = "#00ffaa";
                wordDisplay.style.textShadow = "0 0 30px rgba(0, 255, 170, 0.8)";
            }

            setTimeout(() => {
                if (wordDisplay.innerText === word) {
                    wordDisplay.innerText = "...";
                    wordDisplay.style.color = "#444";
                    wordDisplay.style.textShadow = "none";
                }
            }, 2500);
        };

        recognition.onerror = (event) => {
            if (event.error === 'no-speech') {
                wordDisplay.innerText = "?";
                wordDisplay.style.color = "#f39c12";
                wordDisplay.style.textShadow = "0 0 30px rgba(243, 156, 18, 0.8)";
                sendMultipleTimes('?');
            }
        };

        recognition.onend = () => {
            if (isListening) {
                try { recognition.start(); } catch(e) {}
            }
        };
    </script>
</body>
</html>
