<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מוח → אזור → רשת נוירונים → תא פורקיניה</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    :root{
      --panel: rgba(8,12,18,.68);
      --panel-strong: rgba(8,12,18,.90);
      --border: rgba(255,255,255,.13);
      --text: #f7f8fb;
      --muted: #d6dce7;
      --accent: #94ddff;
      --accent2: #ffd27d;
      --shadow: 0 14px 40px rgba(0,0,0,.30);
      --sidebar-w: 240px;
      --sidebar-gap: 18px;
    }
    *{ box-sizing:border-box; }
    html, body{
      margin:0; width:100%; height:100%; overflow:hidden;
      background:#02040a;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
      color:var(--text);
    }
    #app{
      position:fixed; inset:0;
      background: radial-gradient(circle at 50% 20%, #172337 0%, #050914 55%, #010308 100%);
    }
    #viewport{
      position:absolute; top:0; right:0; bottom:0; left:calc(var(--sidebar-w) + (var(--sidebar-gap) * 2));
      overflow:hidden; touch-action:manipulation; background:#02040a;
    }
    .layer{
      position:absolute; inset:0;
      width:100%; height:100%; object-fit:contain;
      user-select:none; -webkit-user-drag:none; pointer-events:none;
      will-change: transform, opacity, filter;
      transform-origin:50% 50%;
    }
    #imgA{ opacity:1; transform:scale(1); filter:saturate(1) brightness(1) blur(0px); }
    #imgB{ opacity:0; transform:scale(1.18); filter:saturate(.96) brightness(.88) blur(6px); }

    #modelLayer{
      position:absolute; inset:0; z-index:1; opacity:0; pointer-events:none;
      transform:scale(1.08); filter:saturate(.96) brightness(.88) blur(7px);
      transition:none; will-change:opacity, transform, filter;
      background: radial-gradient(circle at 50% 48%, rgba(36,49,70,.44), rgba(2,4,10,.78) 62%, #02040a 100%);
    }
    #modelLayer.active{ pointer-events:auto; }
    #threeContainer{
      position:absolute; inset:0; width:100%; height:100%; z-index:1;
      cursor:grab; touch-action:none;
    }
    #threeContainer:active{ cursor:grabbing; }
    #modelStatus{
      position:absolute; inset:auto 24px 84px 24px; z-index:4; text-align:center; color:#fff;
      font-size:14px; line-height:1.55; display:block; direction:rtl;
      background:var(--panel-strong); border:1px solid var(--border); border-radius:18px; padding:14px;
      pointer-events:none;
    }
    #modelStatus.hidden{ display:none; }
    .modelHelp{
      position:absolute; right:18px; bottom:18px; z-index:3;
      background:var(--panel); border:1px solid var(--border); border-radius:999px;
      padding:10px 14px; font-size:13px; color:var(--muted); direction:rtl;
      backdrop-filter:blur(12px); box-shadow:0 10px 26px rgba(0,0,0,.24);
      pointer-events:none;
    }

    #vignette{
      position:absolute; inset:0; z-index:2; pointer-events:none;
      background: radial-gradient(circle at center, rgba(255,255,255,.025), rgba(0,0,0,.18) 60%, rgba(0,0,0,.44) 100%);
    }
    #flash{
      position:absolute; inset:0; z-index:2; pointer-events:none;
      background: radial-gradient(circle at center, rgba(255,255,255,.10), rgba(0,0,0,.58));
      opacity:0; transition: opacity 3000ms cubic-bezier(.18,.7,.18,1);
    }

    #hotspots{ position:absolute; inset:0; z-index:4; pointer-events:none; }
    .hotspot{
      position:absolute; background:transparent; border:none; outline:none; cursor:pointer; opacity:0; z-index:4; pointer-events:auto;
    }

    #hoverCue{
      position:absolute; z-index:3; width:150px; height:150px; border-radius:50%; pointer-events:none;
      opacity:0; transform:translate(-50%,-50%) scale(.8);
      transition: opacity 240ms ease, transform 240ms ease, left 160ms ease, top 160ms ease;
      background: radial-gradient(circle at center,
        rgba(148,221,255,.20) 0%, rgba(148,221,255,.12) 28%, rgba(148,221,255,.06) 48%, rgba(148,221,255,.02) 66%, rgba(148,221,255,0) 74%);
      box-shadow: 0 0 36px rgba(148,221,255,.10); filter: blur(1px);
    }
    #hoverCue.visible{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    #hoverLabel{
      position:absolute; z-index:6; pointer-events:none; opacity:0; transform:translate(-50%, 0);
      transition: opacity 180ms ease, transform 180ms ease, left 120ms ease, top 120ms ease;
      padding:8px 12px; border-radius:999px; white-space:nowrap; font-size:13px; font-weight:800; color:#fff;
      background:var(--panel-strong); border:1px solid rgba(255,255,255,.16); box-shadow:0 10px 26px rgba(0,0,0,.28);
    }
    #hoverLabel.visible{ opacity:1; transform:translate(-50%, -6px); }

    .panel{
      position:absolute; left:18px; top:18px; z-index:7; background:var(--panel); border:1px solid var(--border);
      border-radius:18px; padding:14px 18px; backdrop-filter: blur(14px); box-shadow:var(--shadow); min-width:170px; direction:rtl;
    }
    .panel h1{ margin:0; font-size:26px; line-height:1.1; font-weight:800; letter-spacing:.01em; }

    .stageMenu{
      position:absolute; left:18px; top:98px; z-index:7; display:flex; flex-direction:column; gap:10px;
      width:var(--sidebar-w); max-height:calc(100vh - 190px); overflow:auto; padding-right:4px;
    }
    .stageCard{
      appearance:none; border:none; cursor:pointer; width:100%; text-align:right;
      display:grid; grid-template-columns: 1fr 74px; align-items:center; gap:10px;
      padding:10px; border-radius:16px; background:var(--panel); border:1px solid var(--border);
      backdrop-filter: blur(14px); box-shadow:0 10px 28px rgba(0,0,0,.22);
      transition: transform .16s ease, background .16s ease, border-color .16s ease, opacity .16s ease;
      color:#fff;
    }
    .stageCard:hover{ transform:translateY(-1px); background:rgba(12,18,28,.84); }
    .stageCard.active{ border-color:rgba(148,221,255,.42); background:rgba(148,221,255,.10); }
    .stageCard:disabled{ cursor:default; opacity:.95; }
    .stageMeta{ display:flex; flex-direction:column; gap:4px; min-width:0; }
    .stageName{ font-size:14px; font-weight:800; line-height:1.15; }
    .stageState{ font-size:11px; color:var(--muted); }
    .stageThumb{
      width:74px; height:54px; object-fit:cover; border-radius:10px; border:1px solid rgba(255,255,255,.14);
      background:#081019;
    }
    .modelThumb{
      width:74px; height:54px; border-radius:10px; border:1px solid rgba(255,255,255,.14);
      background: radial-gradient(circle at 50% 42%, rgba(148,221,255,.25), rgba(8,16,28,.92));
      display:flex; align-items:center; justify-content:center; direction:ltr; color:#fff; font-size:11px; font-weight:800;
    }

    .controls{
      position:absolute; right:18px; top:18px; z-index:7; display:flex; gap:8px; direction:rtl; flex-wrap:wrap; justify-content:flex-end; max-width:min(55vw, 480px);
    }
    button.ctrl{
      appearance:none; border:none; cursor:pointer; color:#fff; font-weight:700;
      background:var(--panel); border:1px solid var(--border); padding:10px 14px; border-radius:999px;
      backdrop-filter: blur(12px); box-shadow:0 10px 28px rgba(0,0,0,.28);
      transition: transform .16s ease, opacity .16s ease, background .16s ease;
    }
    button.ctrl:hover{ transform:translateY(-1px); background:rgba(12,18,28,.84); }
    button.ctrl:disabled{ opacity:.5; cursor:default; transform:none; }

    .hint{
      position:absolute; bottom:18px; z-index:7;
      width:min(840px, calc(100vw - var(--sidebar-w) - 70px));
      left:calc(var(--sidebar-w) + (100vw - var(--sidebar-w))/2); transform:translateX(-50%);
      background:var(--panel); border:1px solid var(--border); padding:12px 16px; border-radius:999px;
      text-align:center; font-size:14px; box-shadow:0 10px 24px rgba(0,0,0,.24); backdrop-filter: blur(12px); direction:rtl;
    }

    @media (max-width: 1080px){
      .stageMenu{ width:190px; }
      .hint{ width:min(760px, calc(100vw - 250px)); }
    }
    @media (max-width: 900px){
      #viewport{ left:0; }
      .controls{ top:auto; bottom:72px; right:12px; max-width:calc(100vw - 24px); }
      .panel{ left:12px; top:12px; }
      .stageMenu{ top:auto; bottom:138px; left:12px; width:170px; max-height:calc(100vh - 260px); }
      .hint{ left:50%; bottom:18px; width:calc(100vw - 24px); border-radius:18px; font-size:13px; }
      .modelHelp{ bottom:106px; right:12px; max-width:calc(100vw - 194px); border-radius:16px; }
    }
    @media (max-width: 760px){
      .panel{ padding:12px 14px; }
      .panel h1{ font-size:22px; }
      #hoverCue{ width:120px; height:120px; }
      #hoverLabel{ font-size:12px; }
      .stageCard{ grid-template-columns: 1fr 60px; padding:8px; }
      .stageThumb, .modelThumb{ width:60px; height:44px; }
      .stageName{ font-size:12px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport">
      <img id="imgA" class="layer" src="brain.png" alt="">
      <img id="imgB" class="layer" src="" alt="">

      <div id="modelLayer" aria-label="מודל תלת-ממדי של תא פורקיניה">
        <div id="threeContainer"></div>
        <div id="modelStatus">טוען מודל FBX...</div>
        <div class="modelHelp">גררו לסיבוב המודל · גלגלת/צביטה לזום</div>
      </div>

      <div id="vignette"></div>
      <div id="flash"></div>
      <div id="hoverCue"></div>
      <div id="hotspots"></div>
      <div id="hoverLabel"></div>
    </div>

    <section class="panel">
      <h1 id="title"></h1>
    </section>

    <nav class="stageMenu" id="stageMenu"></nav>

    <div class="controls">
      <button class="ctrl" id="fullscreenBtn">מסך מלא</button>
      <button class="ctrl" id="homeBtn">בית</button>
      <button class="ctrl" id="backBtn">חזרה</button>
    </div>

    <div class="hint" id="hint"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

    const STAGE_ORDER = ["brain", "cerebellum", "network", "purkinje"];

    const STATES = {
      brain: {
        type: "image",
        image: "brain.png",
        aspect: 1672 / 941,
        title: "מוח",
        hint: "לחצו על האזור המסומן כדי להתקרב.",
        crumb: "מוח",
        parent: null,
        hotspots: [
          { x: 61, y: 49, w: 34, h: 37, target: "cerebellum", label: "התקרבות לאזור", cueX: 78, cueY: 68, zoomScale: 3.0, nextStartScale: 1.35, nextOriginX: 50, nextOriginY: 50 }
        ]
      },
      cerebellum: {
        type: "image",
        image: "cerebellum.png",
        aspect: 1672 / 941,
        title: "האזור",
        hint: "לחצו על האזור כדי להתקרב לרשת הנוירונים שבתוכו.",
        crumb: "האזור",
        parent: "brain",
        hotspots: [
          { x: 12, y: 13, w: 76, h: 74, target: "network", label: "התקרבות לרשת הנוירונים", cueX: 50, cueY: 50, zoomScale: 3.2, nextStartScale: 1.36, nextOriginX: 50, nextOriginY: 48 }
        ]
      },
      network: {
        type: "image",
        image: "cerebellum_neuralNetwork.png",
        aspect: 1448 / 1086,
        title: "רשת נוירונים באזור",
        hint: "לחצו על אחד מתאי פורקיניה כדי לעבור למודל תלת־ממדי.",
        crumb: "רשת נוירונים",
        parent: "cerebellum",
        hotspots: [
          { x: 30, y: 17, w: 40, h: 73, target: "purkinje", label: "תא פורקיניה", cueX: 50, cueY: 54, zoomScale: 3.8, nextStartScale: 1.18, nextOriginX: 50, nextOriginY: 54 }
        ]
      },
      purkinje: {
        type: "model",
        model: "purkinje_cell.fbx",
        aspect: 1672 / 941,
        title: "תא פורקיניה",
        hint: "זהו מודל FBX אמיתי. אפשר לסובב אותו, להתקרב ולהתרחק.",
        crumb: "תא פורקיניה",
        parent: "network",
        hotspots: []
      }
    };

    const imgA = document.getElementById("imgA");
    const imgB = document.getElementById("imgB");
    const modelLayer = document.getElementById("modelLayer");
    const threeContainer = document.getElementById("threeContainer");
    const modelStatus = document.getElementById("modelStatus");
    const flash = document.getElementById("flash");
    const hotspotsEl = document.getElementById("hotspots");
    const titleEl = document.getElementById("title");
    const hintEl = document.getElementById("hint");
    const stageMenuEl = document.getElementById("stageMenu");
    const backBtn = document.getElementById("backBtn");
    const homeBtn = document.getElementById("homeBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const hoverCue = document.getElementById("hoverCue");
    const hoverLabel = document.getElementById("hoverLabel");
    const viewport = document.getElementById("viewport");

    let current = "brain";
    let history = [];
    let front = imgA;
    let back = imgB;
    let busy = false;
    let visited = new Set(["brain"]);
    let currentHoverTarget = null;
    let hideHoverTimer = null;
    let visualMode = "image";

    function currentAspect(){ return STATES[current]?.aspect || (1672 / 941); }

    function imageRect(stateKey = current){
      const r = viewport.getBoundingClientRect();
      const vw = r.width;
      const vh = r.height;
      const aspect = STATES[stateKey]?.aspect || currentAspect();
      const viewAspect = vw / vh;
      let w, h, left, top;
      if (viewAspect > aspect) {
        h = vh;
        w = h * aspect;
        left = (vw - w) / 2;
        top = 0;
      } else {
        w = vw;
        h = w / aspect;
        left = 0;
        top = (vh - h) / 2;
      }
      return { left, top, width: w, height: h };
    }

    function pointFromImagePercent(x, y, stateKey = current){
      const r = imageRect(stateKey);
      return { x: r.left + (x / 100) * r.width, y: r.top + (y / 100) * r.height };
    }

    function placeByImagePercent(el, x, y, w, h, stateKey = current){
      const r = imageRect(stateKey);
      el.style.left = (r.left + (x / 100) * r.width) + "px";
      el.style.top = (r.top + (y / 100) * r.height) + "px";
      el.style.width = ((w / 100) * r.width) + "px";
      el.style.height = ((h / 100) * r.height) + "px";
    }

    function hotspotBounds(h){
      if (!h.poly) return { x: h.x, y: h.y, w: h.w, h: h.h };
      const xs = h.poly.map(p => p[0]);
      const ys = h.poly.map(p => p[1]);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }

    function applyHotspotShape(el, h){
      const b = hotspotBounds(h);
      placeByImagePercent(el, b.x, b.y, b.w, b.h);
      if (h.poly) {
        const pts = h.poly.map(([px, py]) => `${((px - b.x) / b.w) * 100}% ${((py - b.y) / b.h) * 100}%`).join(', ');
        el.style.clipPath = `polygon(${pts})`;
      } else {
        el.style.clipPath = 'none';
      }
    }

    function preloadImages(){
      Object.values(STATES).filter(s => s.type === "image").forEach(s => {
        const img = new Image();
        img.src = s.image;
      });
    }

    function buildHistoryFor(target){
      const chain = [];
      let node = STATES[target];
      while (node && node.parent) {
        chain.unshift(node.parent);
        node = STATES[node.parent];
      }
      return chain;
    }

    function resetLayer(el, src=null) {
      if (src !== null) el.src = src;
      el.style.transition = "none";
      el.style.opacity = "0";
      el.style.transform = "translate3d(0px,0px,0px) scale(1.20)";
      el.style.filter = "saturate(.96) brightness(.88) blur(7px)";
      el.style.transformOrigin = "50% 50%";
      void el.offsetWidth;
      el.style.transition = "";
    }

    function resetModelLayer() {
      modelLayer.style.transition = "none";
      modelLayer.style.opacity = "0";
      modelLayer.style.transform = "scale(1.08)";
      modelLayer.style.filter = "saturate(.96) brightness(.88) blur(7px)";
      modelLayer.classList.remove("active");
      void modelLayer.offsetWidth;
      modelLayer.style.transition = "";
    }

    function renderStageMenu(){
      stageMenuEl.innerHTML = "";
      STAGE_ORDER.filter(key => visited.has(key)).forEach(key => {
        const s = STATES[key];
        const btn = document.createElement("button");
        btn.className = "stageCard" + (key === current ? " active" : "");
        btn.disabled = busy ? true : false;
        btn.addEventListener("click", () => { if (key !== current) jumpToState(key); });

        const meta = document.createElement("div");
        meta.className = "stageMeta";
        const name = document.createElement("div");
        name.className = "stageName";
        name.textContent = s.crumb;
        const state = document.createElement("div");
        state.className = "stageState";
        state.textContent = key === current ? "הרמה הנוכחית" : "נפתחה";
        meta.appendChild(name);
        meta.appendChild(state);

        let thumb;
        if (s.type === "image") {
          thumb = document.createElement("img");
          thumb.className = "stageThumb";
          thumb.src = s.image;
          thumb.alt = s.crumb;
        } else {
          thumb = document.createElement("div");
          thumb.className = "modelThumb";
          thumb.textContent = "FBX";
        }

        btn.appendChild(meta);
        btn.appendChild(thumb);
        stageMenuEl.appendChild(btn);
      });
    }

    function hideHoverCue(force=false, target=null){
      clearTimeout(hideHoverTimer);
      if (!force && target && currentHoverTarget && target !== currentHoverTarget) return;
      hideHoverTimer = setTimeout(() => {
        currentHoverTarget = null;
        hoverCue.classList.remove("visible");
        hoverLabel.classList.remove("visible");
        hoverLabel.textContent = "";
        viewport.style.cursor = "default";
      }, force ? 0 : 45);
    }

    function mousePointInViewport(ev){
      const r = viewport.getBoundingClientRect();
      return { x: ev.clientX - r.left, y: ev.clientY - r.top };
    }

    function setGlowAtMouse(h, ev){
      const b = hotspotBounds(h);
      const r = imageRect();
      const cueSize = Math.max(95, Math.min(175, Math.max((b.w/100)*r.width, (b.h/100)*r.height) * 0.38));
      const p = ev ? mousePointInViewport(ev) : pointFromImagePercent(h.cueX ?? (b.x + b.w/2), h.cueY ?? (b.y + b.h/2));
      hoverCue.style.width = cueSize + "px";
      hoverCue.style.height = cueSize + "px";
      hoverCue.style.left = p.x + "px";
      hoverCue.style.top = p.y + "px";
      hoverCue.classList.add("visible");
      return { p, cueSize };
    }

    function showHoverCue(h, ev=null){
      clearTimeout(hideHoverTimer);
      const sameTarget = currentHoverTarget === h.target && hoverCue.classList.contains("visible");
      currentHoverTarget = h.target;
      const { p, cueSize } = setGlowAtMouse(h, ev);
      if (!sameTarget) {
        if (h.label && h.label.trim()) {
          hoverLabel.textContent = h.label;
          hoverLabel.style.left = p.x + "px";
          hoverLabel.style.top = (p.y + cueSize/2 + 8) + "px";
          hoverLabel.classList.add("visible");
        } else {
          hoverLabel.classList.remove("visible");
          hoverLabel.textContent = "";
        }
      }
      viewport.style.cursor = "zoom-in";
    }

    function renderUI(){
      const s = STATES[current];
      titleEl.textContent = s.title;
      hintEl.textContent = s.hint;
      backBtn.disabled = history.length === 0;
      renderStageMenu();
      hotspotsEl.innerHTML = "";
      hideHoverCue(true);

      if (s.type === "image") {
        s.hotspots.slice().sort((a,b) => (a.priority||0) - (b.priority||0)).forEach(h => {
          const btn = document.createElement("button");
          btn.className = "hotspot";
          applyHotspotShape(btn, h);
          btn.addEventListener("mouseenter", (ev) => showHoverCue(h, ev));
          btn.addEventListener("mousemove", (ev) => showHoverCue(h, ev));
          btn.addEventListener("mouseleave", () => hideHoverCue(false, h.target));
          btn.addEventListener("focus", () => showHoverCue(h));
          btn.addEventListener("blur", () => hideHoverCue(true));
          btn.addEventListener("click", () => navigate(h.target, h));
          hotspotsEl.appendChild(btn);
        });
      }
      updateFullscreenButton();
    }

    function swapLayers() {
      const temp = front;
      front = back;
      back = temp;
      resetLayer(back);
    }

    function showImageOnly(){
      visualMode = "image";
      modelLayer.classList.remove("active");
      modelLayer.style.pointerEvents = "none";
    }

    function showModelOnly(){
      visualMode = "model";
      modelLayer.classList.add("active");
      modelLayer.style.pointerEvents = "auto";
    }

    function animateTransition(target, hotspot=null, mode="forward") {
      busy = true;
      hideHoverCue(true);
      renderStageMenu();

      const targetState = STATES[target];
      const currentState = STATES[current];
      const isBackLike = mode === "back";
      const duration = isBackLike ? 2400 : 3000;
      const hb = hotspot ? hotspotBounds(hotspot) : null;
      const cx = hotspot ? (hotspot.cueX ?? (hb.x + hb.w/2)) : 50;
      const cy = hotspot ? (hotspot.cueY ?? (hb.y + hb.h/2)) : 50;
      const zoomScale = hotspot?.zoomScale || (isBackLike ? 1.16 : 1.45);
      const nextStartScale = hotspot?.nextStartScale || (isBackLike ? 0.94 : 1.16);
      const nextOriginX = hotspot?.nextOriginX ?? 50;
      const nextOriginY = hotspot?.nextOriginY ?? 50;

      if (currentState.type === "model" && targetState.type === "image") {
        back.src = targetState.image;
        back.style.transition = `transform ${duration}ms cubic-bezier(.16,.72,.18,1), opacity ${duration}ms cubic-bezier(.16,.72,.18,1), filter ${duration}ms cubic-bezier(.16,.72,.18,1)`;
        modelLayer.style.transition = `transform ${duration}ms cubic-bezier(.16,.72,.18,1), opacity ${duration}ms cubic-bezier(.16,.72,.18,1), filter ${duration}ms cubic-bezier(.16,.72,.18,1)`;
        back.style.opacity = "0";
        back.style.transform = "translate3d(0px,0px,0px) scale(0.94)";
        back.style.filter = "saturate(.96) brightness(.90) blur(4px)";
        void back.offsetWidth;
        requestAnimationFrame(() => {
          flash.style.opacity = ".78";
          modelLayer.style.opacity = "0";
          modelLayer.style.transform = "scale(1.15)";
          modelLayer.style.filter = "saturate(1.04) brightness(1.00) blur(4px)";
          back.style.opacity = "1";
          back.style.transform = "translate3d(0px,0px,0px) scale(1)";
          back.style.filter = "saturate(1) brightness(1) blur(0px)";
        });
        setTimeout(() => { flash.style.opacity = "0"; }, 650);
        setTimeout(() => {
          current = target;
          visited.add(target);
          swapLayers();
          resetModelLayer();
          showImageOnly();
          busy = false;
          renderUI();
        }, duration + 80);
        return;
      }

      if (currentState.type === "image" && targetState.type === "model") {
        front.style.transition = `transform ${duration}ms cubic-bezier(.16,.72,.18,1), opacity ${duration}ms cubic-bezier(.16,.72,.18,1), filter ${duration}ms cubic-bezier(.16,.72,.18,1)`;
        modelLayer.style.transition = `transform ${duration}ms cubic-bezier(.16,.72,.18,1), opacity ${duration}ms cubic-bezier(.16,.72,.18,1), filter ${duration}ms cubic-bezier(.16,.72,.18,1)`;
        front.style.transformOrigin = `${cx}% ${cy}%`;
        modelLayer.style.opacity = "0";
        modelLayer.style.transform = `scale(${nextStartScale})`;
        modelLayer.style.filter = "saturate(.96) brightness(.88) blur(7px)";
        modelLayer.classList.add("active");
        void modelLayer.offsetWidth;
        requestAnimationFrame(() => {
          flash.style.opacity = ".95";
          front.style.transform = `translate3d(0px,0px,0px) scale(${zoomScale})`;
          front.style.opacity = "0";
          front.style.filter = "saturate(1.15) brightness(1.04) blur(3px)";
          setTimeout(() => {
            modelLayer.style.opacity = "1";
            modelLayer.style.transform = "scale(1)";
            modelLayer.style.filter = "saturate(1) brightness(1) blur(0px)";
          }, Math.round(duration * 0.22));
        });
        setTimeout(() => { flash.style.opacity = "0"; }, 650);
        setTimeout(() => {
          current = target;
          visited.add(target);
          showModelOnly();
          resetLayer(back);
          busy = false;
          renderUI();
        }, duration + 80);
        return;
      }

      // Image-to-image transition
      back.src = targetState.image;
      front.style.transition = `transform ${duration}ms cubic-bezier(.16,.72,.18,1), opacity ${duration}ms cubic-bezier(.16,.72,.18,1), filter ${duration}ms cubic-bezier(.16,.72,.18,1)`;
      back.style.transition  = `transform ${duration}ms cubic-bezier(.16,.72,.18,1), opacity ${duration}ms cubic-bezier(.16,.72,.18,1), filter ${duration}ms cubic-bezier(.16,.72,.18,1)`;
      front.style.transformOrigin = `${cx}% ${cy}%`;
      back.style.transformOrigin = `${nextOriginX}% ${nextOriginY}%`;

      if (isBackLike) {
        back.style.opacity = "0";
        back.style.transform = "translate3d(0px,0px,0px) scale(0.94)";
        back.style.filter = "saturate(.96) brightness(.90) blur(4px)";
      } else {
        back.style.opacity = "0";
        back.style.transform = `translate3d(0px,0px,0px) scale(${nextStartScale})`;
        back.style.filter = "saturate(.96) brightness(.88) blur(7px)";
      }
      void back.offsetWidth;

      requestAnimationFrame(() => {
        flash.style.opacity = ".95";
        if (isBackLike) {
          front.style.transform = "translate3d(0px,0px,0px) scale(1.18)";
          front.style.opacity = "0.05";
          front.style.filter = "saturate(1.06) brightness(1.02) blur(1px)";
          back.style.opacity = "1";
          back.style.transform = "translate3d(0px,0px,0px) scale(1)";
          back.style.filter = "saturate(1) brightness(1) blur(0px)";
        } else {
          front.style.transform = `translate3d(0px,0px,0px) scale(${zoomScale})`;
          front.style.opacity = "0.00";
          front.style.filter = "saturate(1.15) brightness(1.04) blur(2px)";
          setTimeout(() => {
            back.style.opacity = "1";
            back.style.transform = "translate3d(0px,0px,0px) scale(1)";
            back.style.filter = "saturate(1) brightness(1) blur(0px)";
          }, Math.round(duration * 0.22));
        }
      });

      setTimeout(() => { flash.style.opacity = "0"; }, 650);
      setTimeout(() => {
        current = target;
        visited.add(target);
        swapLayers();
        showImageOnly();
        busy = false;
        renderUI();
      }, duration + 80);
    }

    function navigate(target, hotspot){
      if (busy || target === current) return;
      history = buildHistoryFor(current).concat([current]);
      animateTransition(target, hotspot, "forward");
    }

    function goBack(){
      if (busy || history.length === 0) return;
      const prev = history.pop();
      animateTransition(prev, null, "back");
    }

    function goHome(){
      if (busy || current === "brain") return;
      history = [];
      animateTransition("brain", null, "back");
    }

    function jumpToState(target){
      if (busy || target === current || !visited.has(target)) return;
      const currentIndex = STAGE_ORDER.indexOf(current);
      const targetIndex = STAGE_ORDER.indexOf(target);
      history = buildHistoryFor(target);
      const mode = targetIndex < currentIndex ? "back" : "forward";
      animateTransition(target, null, mode);
    }

    function updateFullscreenButton(){
      const isFull = !!document.fullscreenElement;
      fullscreenBtn.textContent = isFull ? "יציאה ממסך מלא" : "מסך מלא";
    }

    async function toggleFullscreen(){
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch(e) {}
      updateFullscreenButton();
    }

    backBtn.addEventListener("click", goBack);
    homeBtn.addEventListener("click", goHome);
    fullscreenBtn.addEventListener("click", toggleFullscreen);
    document.addEventListener("fullscreenchange", () => { updateFullscreenButton(); if (!busy) renderUI(); });
    window.addEventListener("resize", () => { resizeThreeViewer(); if (!busy) renderUI(); });

    let threeRenderer = null;
    let threeScene = null;
    let threeCamera = null;
    let threeControls = null;
    let purkinjeObject = null;
    let threeReady = false;

    function setModelStatus(text, hide=false){
      modelStatus.textContent = text;
      modelStatus.classList.toggle("hidden", hide);
    }

    function initThreeViewer(){
      threeScene = new THREE.Scene();
      threeScene.background = null;

      threeCamera = new THREE.PerspectiveCamera(45, 1, 0.01, 100000);
      threeCamera.position.set(0, 0.5, 4);

      threeRenderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
      threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      threeRenderer.outputColorSpace = THREE.SRGBColorSpace;
      threeRenderer.setClearColor(0x000000, 0);
      threeContainer.appendChild(threeRenderer.domElement);

      threeControls = new OrbitControls(threeCamera, threeRenderer.domElement);
      threeControls.enableDamping = true;
      threeControls.dampingFactor = 0.06;
      threeControls.enablePan = false;
      threeControls.rotateSpeed = 0.75;
      threeControls.zoomSpeed = 0.75;

      const ambient = new THREE.HemisphereLight(0xffffff, 0x334455, 1.4);
      threeScene.add(ambient);
      const key = new THREE.DirectionalLight(0xffffff, 1.7);
      key.position.set(3, 4, 5);
      threeScene.add(key);
      const fill = new THREE.DirectionalLight(0xffffff, 0.75);
      fill.position.set(-4, 2, -3);
      threeScene.add(fill);

      resizeThreeViewer();

      const loader = new FBXLoader();
      loader.load(STATES.purkinje.model, (object) => {
        purkinjeObject = object;

        object.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (!child.material) {
              child.material = new THREE.MeshStandardMaterial({ roughness:0.45, metalness:0.02 });
            }
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach((mat) => {
              mat.side = THREE.DoubleSide;
              if (mat.color && mat.color.r === 1 && mat.color.g === 1 && mat.color.b === 1) {
                mat.color.setRGB(0.95, 0.58, 0.52);
              }
              mat.needsUpdate = true;
            });
          }
        });

        const box = new THREE.Box3().setFromObject(object);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        object.position.sub(center);
        threeScene.add(object);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const distance = maxDim * 2.1;
        threeCamera.near = Math.max(maxDim / 1000, 0.001);
        threeCamera.far = maxDim * 1000;
        threeCamera.position.set(maxDim * 0.15, maxDim * 0.05, distance);
        threeCamera.updateProjectionMatrix();
        threeControls.target.set(0, 0, 0);
        threeControls.minDistance = maxDim * 0.15;
        threeControls.maxDistance = maxDim * 8;
        threeControls.update();

        threeReady = true;
        setModelStatus("", true);
      }, (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          setModelStatus(`טוען מודל FBX... ${pct}%`);
        }
      }, (err) => {
        console.error(err);
        setModelStatus("לא הצלחתי לטעון את קובץ ה־FBX. מומלץ להריץ דרך GitHub Pages או Moodle, ולא לפתוח את הקובץ ישירות מהמחשב.");
      });

      animateThree();
    }

    function resizeThreeViewer(){
      if (!threeRenderer || !threeCamera) return;
      const rect = threeContainer.getBoundingClientRect();
      const w = Math.max(1, Math.floor(rect.width));
      const h = Math.max(1, Math.floor(rect.height));
      threeRenderer.setSize(w, h, false);
      threeCamera.aspect = w / h;
      threeCamera.updateProjectionMatrix();
    }

    function animateThree(){
      requestAnimationFrame(animateThree);
      if (threeControls) threeControls.update();
      if (threeRenderer && threeScene && threeCamera) threeRenderer.render(threeScene, threeCamera);
    }

    preloadImages();
    resetModelLayer();
    initThreeViewer();
    renderUI();
  </script>
</body>
</html>
