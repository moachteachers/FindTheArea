<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microbit Rating</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #connectScreen,
    #experimentScreen {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #experimentScreen {
      display: none;
      flex-direction: column;
      padding: 14px;
      gap: 10px;
    }

    #connectScreen {
      flex-direction: column;
      gap: 18px;
      padding: 20px;
    }

    #connectErrorMessage {
      display: none;
      max-width: min(92vw, 720px);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      color: #ffffff;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.45;
      text-align: center;
      box-shadow: 0 14px 34px rgba(0,0,0,0.28);
    }

    #connectBtn {
      border: none;
      border-radius: 22px;
      cursor: pointer;
      font-weight: 800;
      font-size: 24px;
      padding: 18px 32px;
      background:
        radial-gradient(circle at 25% 15%, rgba(255,255,255,0.95), transparent 28%),
        linear-gradient(135deg, #ffffff 0%, #d8e4ff 45%, #b9c7ff 100%);
      color: #111827;
      box-shadow:
        0 18px 42px rgba(160, 180, 255, 0.30),
        0 2px 0 rgba(255,255,255,0.70) inset,
        0 -3px 10px rgba(0,0,0,0.14) inset;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    #connectBtn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow:
        0 24px 54px rgba(160, 180, 255, 0.40),
        0 2px 0 rgba(255,255,255,0.80) inset,
        0 -3px 10px rgba(0,0,0,0.12) inset;
    }

    #connectBtn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .stage {
      width: min(92vw, 960px);
      height: min(72vh, 620px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      flex: 0 0 auto;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      transform-origin: center center;
    }

    canvas.pulsing {
      animation: imageBreath 3.2s ease-in-out infinite;
    }

    @keyframes imageBreath {
      0%, 100% { transform: scale(1.012); }
      50% { transform: scale(1.045); }
    }

    #errorMessage {
      position: absolute;
      inset: auto 16px 16px 16px;
      display: none;
      background: rgba(0,0,0,0.78);
      color: #fff;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 16px;
      text-align: center;
    }

    #demoSignal {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      background: rgba(255,255,255,0.94);
      color: #000;
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      z-index: 5;
      white-space: nowrap;
      box-shadow: 0 12px 28px rgba(0,0,0,0.3);
    }

    #gameOverMessage {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      z-index: 4;
    }

    #gameOverMessage .zigWrap {
      display: inline-flex;
      direction: rtl;
      flex-direction: row;
      align-items: flex-end;
      gap: 0.05em;
      transform: rotate(-2.5deg) skewX(-7deg);
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.10));
    }

    #gameOverMessage .zigWord {
      display: inline-flex;
      direction: rtl;
      flex-direction: row;
      align-items: flex-end;
      gap: 0.04em;
    }

    #gameOverMessage .zigWord + .zigWord {
      margin-right: 0.26em;
      margin-left: 0;
    }

    #gameOverMessage .zigChar {
      position: relative;
      display: inline-block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(58px, 11vw, 132px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: transparent;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.92) 0%,
          rgba(242,242,242,0.74) 10%,
          rgba(170,170,170,0.44) 34%,
          rgba(248,248,248,0.74) 56%,
          rgba(126,126,126,0.34) 100%
        );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-stroke: 1px rgba(236,236,236,0.22);
      text-shadow:
        0 1px 0 rgba(255,255,255,0.22),
        0 0 16px rgba(255,255,255,0.06),
        0 0 2px rgba(50,50,50,0.20);
      clip-path: polygon(
        10% 0%,
        88% 0%,
        100% 10%,
        92% 22%,
        100% 36%,
        90% 52%,
        100% 68%,
        88% 100%,
        14% 100%,
        0% 84%,
        8% 70%,
        0% 54%,
        10% 40%,
        0% 22%
      );
    }

    #gameOverMessage .zigChar::before {
      content: "";
      position: absolute;
      left: -0.08em;
      top: 0.02em;
      width: 0.16em;
      height: 0.24em;
      background: linear-gradient(180deg, rgba(245,245,245,0.70), rgba(140,140,140,0.24));
      clip-path: polygon(100% 0, 0 100%, 100% 70%);
      opacity: 0.72;
      pointer-events: none;
    }

    #gameOverMessage .zigChar::after {
      content: "";
      position: absolute;
      right: 0.04em;
      bottom: -0.18em;
      width: 0.16em;
      height: 0.38em;
      background: linear-gradient(180deg, rgba(235,235,235,0.68), rgba(120,120,120,0.25));
      opacity: 0.74;
      transform: skewX(-18deg);
      clip-path: polygon(0 0, 100% 0, 68% 100%, 0 100%);
      pointer-events: none;
    }

    #gameOverMessage .zigChar:nth-child(odd) {
      transform: translateY(-0.10em) rotate(-11deg) skewX(-12deg);
    }

    #gameOverMessage .zigChar:nth-child(even) {
      transform: translateY(0.09em) rotate(9deg) skewX(-5deg);
    }

    #gameOverMessage .zigChar.tall {
      transform: translateY(-0.14em) rotate(-14deg) skewX(-12deg) scaleY(1.12);
    }

    #gameOverMessage .zigChar.deep {
      transform: translateY(0.13em) rotate(10deg) skewX(-6deg) scaleY(0.94);
    }

    #gameOverMessage .zigChar.spikeL::before {
      width: 0.20em;
      height: 0.28em;
      opacity: 0.78;
    }

    #gameOverMessage .zigChar.longTail::after {
      height: 0.54em;
      bottom: -0.34em;
      width: 0.17em;
      opacity: 0.80;
    }

    #controlsArea {
      width: min(92vw, 960px);
      height: 112px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    #ratingPanel {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    #ratingPanel.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .ratingWrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      direction: ltr;
      flex-wrap: nowrap;
      padding: 10px 14px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 16px 42px rgba(0,0,0,0.34);
      backdrop-filter: blur(10px);
    }

    .buttonsCluster {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .sideLabel {
      color: #ffffff;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
      min-width: 78px;
      text-align: center;
      text-shadow: 0 2px 14px rgba(255,255,255,0.26);
    }

    .ratingBtn {
      width: 82px;
      height: 82px;
      border: 1px solid rgba(186, 230, 253, 0.46);
      border-radius: 24px;
      color: #ffffff;
      font-size: 34px;
      font-weight: 900;
      cursor: pointer;
      flex: 0 0 auto;
      position: relative;
      overflow: hidden;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
      background:
        radial-gradient(circle at 28% 18%, rgba(255,255,255,0.34), transparent 32%),
        linear-gradient(135deg, rgba(125, 211, 252, 0.34), rgba(148, 163, 184, 0.20));
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.34),
        0 0 24px rgba(125, 211, 252, 0.16),
        0 2px 0 rgba(255,255,255,0.20) inset,
        0 -6px 14px rgba(0,0,0,0.18) inset;
      backdrop-filter: blur(10px);
      transition:
        transform 0.15s ease,
        box-shadow 0.15s ease,
        filter 0.15s ease,
        opacity 0.15s ease;
    }

    .ratingBtn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 28% 18%, rgba(255,255,255,0.28), transparent 30%);
      opacity: 0.9;
      pointer-events: none;
    }

    .ratingBtn::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.16);
      pointer-events: none;
    }

    .ratingBtn:hover {
      transform: translateY(-3px) scale(1.035);
      filter: brightness(1.10);
      box-shadow:
        0 20px 40px rgba(0,0,0,0.42),
        0 0 32px rgba(125, 211, 252, 0.25),
        0 2px 0 rgba(255,255,255,0.28) inset,
        0 -6px 14px rgba(0,0,0,0.15) inset;
    }

    .ratingBtn:active {
      transform: translateY(0px) scale(0.98);
    }

    .ratingBtn:disabled {
      opacity: 0.42;
      cursor: default;
      transform: none;
      filter: grayscale(0.2);
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    }

    @media (max-width: 700px) {
      #connectBtn {
        font-size: 20px;
        padding: 16px 24px;
      }

      #connectErrorMessage {
        font-size: 17px;
        padding: 12px 14px;
      }

      .stage {
        width: 94vw;
        height: 62vh;
      }

      #controlsArea {
        width: 94vw;
        height: 104px;
      }

      .ratingWrap {
        gap: 8px;
        padding: 8px 10px;
        border-radius: 24px;
      }

      .buttonsCluster {
        gap: 7px;
      }

      .ratingBtn {
        width: 66px;
        height: 66px;
        font-size: 28px;
        border-radius: 20px;
      }

      .ratingBtn::after {
        inset: 8px;
        border-radius: 15px;
      }

      .sideLabel {
        font-size: 16px;
        min-width: 52px;
      }

      #demoSignal {
        font-size: 20px;
        padding: 10px 14px;
        white-space: normal;
        max-width: calc(100% - 32px);
      }

      #gameOverMessage .zigChar {
        font-size: clamp(42px, 12vw, 82px);
      }
    }
  </style>
</head>
<body>
  <div id="connectScreen">
    <button id="connectBtn">חיבור למיקרוביט</button>
    <div id="connectErrorMessage" role="alert"></div>
  </div>

  <div id="experimentScreen">
    <div class="stage">
      <canvas id="imageCanvas"></canvas>
      
      <div id="errorMessage"></div>
      <div id="gameOverMessage" aria-label="Game Over">
        <div class="zigWrap">
          <span class="zigWord">
            <span class="zigChar longTail">R</span>
            <span class="zigChar deep">E</span>
            <span class="zigChar spikeL">V</span>
            <span class="zigChar tall">O</span>
          </span>
          <span class="zigWord">
            <span class="zigChar">E</span>
            <span class="zigChar deep">M</span>
            <span class="zigChar">A</span>
            <span class="zigChar tall spikeL">G</span>
          </span>
        </div>
      </div>
    </div>
    <div id="controlsArea">
      <div id="ratingPanel">
        <div class="ratingWrap">
          <span class="sideLabel">ניטרלי</span>
          <div class="buttonsCluster">
            <button class="ratingBtn" data-rating="1">1</button>
            <button class="ratingBtn" data-rating="2">2</button>
            <button class="ratingBtn" data-rating="3">3</button>
          </div>
          <span class="sideLabel">מפחיד</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const IMAGE_FILES = [
      "scary1.png", "scary2.png", "scary3.png", "scary4.png", "scary5.png",
      "neutral1.png", "neutral2.png", "neutral3.png", "neutral4.png", "neutral5.png"
    ];

    const IN_ANIMATION_DURATION_MS = 3800;
    const MORPH_ANIMATION_DURATION_MS = 3300;
    const BLOCK_SIZE = 18;

    const connectScreen = document.getElementById("connectScreen");
    const experimentScreen = document.getElementById("experimentScreen");
    const connectBtn = document.getElementById("connectBtn");
    const connectErrorMessage = document.getElementById("connectErrorMessage");
    const canvas = document.getElementById("imageCanvas");
    const ctx = canvas.getContext("2d");
    const errorMessage = document.getElementById("errorMessage");
    const ratingPanel = document.getElementById("ratingPanel");
    const ratingButtons = [...document.querySelectorAll(".ratingBtn")];
    const demoSignal = document.getElementById("demoSignal");
    const gameOverMessage = document.getElementById("gameOverMessage");

    let imageDeck = [];
    let isWaitingForRating = false;
    let isTransitioning = false;
    let hasFinishedExperiment = false;
    let animationId = null;
    let currentFile = "";
    let currentSourceCanvas = null;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function resetDeck() {
      imageDeck = shuffle(IMAGE_FILES);
      hasFinishedExperiment = false;
    }

    function getNextImageFile() {
      return imageDeck.length > 0 ? imageDeck.pop() : null;
    }

    function startImagePulse() {
      canvas.classList.add("pulsing");
    }

    function stopImagePulse() {
      canvas.classList.remove("pulsing");
    }

    function resizeCanvasToDisplaySize() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const newWidth = Math.max(320, Math.round(rect.width * ratio));
      const newHeight = Math.max(240, Math.round(rect.height * ratio));
      if (canvas.width !== newWidth || canvas.height !== newHeight) {
        canvas.width = newWidth;
        canvas.height = newHeight;
      }
    }

    function hideGameOver() {
      gameOverMessage.style.display = "none";
    }

    function showGameOver() {
      stopImagePulse();
      setRatingButtonsEnabled(false);
      drawEmptyCanvas();
      gameOverMessage.style.display = "flex";
      hasFinishedExperiment = true;
      isTransitioning = false;
      currentSourceCanvas = null;
    }

    function drawEmptyCanvas() {
      stopImagePulse();
      resizeCanvasToDisplaySize();
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`Image not found: ${src}`));
        img.src = src;
      });
    }

    function createFittedImageCanvas(image) {
      const sourceCanvas = document.createElement("canvas");
      sourceCanvas.width = canvas.width;
      sourceCanvas.height = canvas.height;
      const sourceCtx = sourceCanvas.getContext("2d");

      sourceCtx.fillStyle = "#000";
      sourceCtx.fillRect(0, 0, sourceCanvas.width, sourceCanvas.height);

      const canvasRatio = sourceCanvas.width / sourceCanvas.height;
      const imageRatio = image.naturalWidth / image.naturalHeight;
      let drawWidth, drawHeight, drawX, drawY;

      if (imageRatio > canvasRatio) {
        drawWidth = sourceCanvas.width;
        drawHeight = drawWidth / imageRatio;
        drawX = 0;
        drawY = (sourceCanvas.height - drawHeight) / 2;
      } else {
        drawHeight = sourceCanvas.height;
        drawWidth = drawHeight * imageRatio;
        drawX = (sourceCanvas.width - drawWidth) / 2;
        drawY = 0;
      }

      sourceCtx.drawImage(image, drawX, drawY, drawWidth, drawHeight);
      return sourceCanvas;
    }

    function createBlocks(width, height) {
      const blocks = [];
      for (let y = 0; y < height; y += BLOCK_SIZE) {
        for (let x = 0; x < width; x += BLOCK_SIZE) {
          blocks.push({
            x,
            y,
            w: Math.min(BLOCK_SIZE, width - x),
            h: Math.min(BLOCK_SIZE, height - y)
          });
        }
      }
      return blocks;
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function clamp01(value) {
      return Math.max(0, Math.min(1, value));
    }

    function drawNoiseOverlay(strength) {
      const density = Math.floor(110 * strength);
      ctx.save();
      ctx.globalAlpha = Math.min(0.22, 0.04 + strength * 0.13);
      for (let i = 0; i < density; i++) {
        const size = 2 + Math.random() * 8;
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const gray = Math.floor(100 + Math.random() * 155);
        ctx.fillStyle = `rgb(${gray}, ${gray}, ${gray})`;
        ctx.fillRect(x, y, size, size);
      }
      ctx.restore();
    }

    function drawBlocksFromCanvas(sourceCanvas, blocks, getPosition, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      for (const block of blocks) {
        const pos = getPosition(block);
        ctx.drawImage(sourceCanvas, block.x, block.y, block.w, block.h, pos.x, pos.y, block.w, block.h);
      }
      ctx.restore();
    }

    function animateScrambleIn(sourceCanvas) {
      return new Promise((resolve) => {
        const blocks = createBlocks(sourceCanvas.width, sourceCanvas.height);
        const cloud = shuffle(blocks.map(block => ({ x: block.x, y: block.y })));

        blocks.forEach((block, index) => {
          block.cloudX = cloud[index].x;
          block.cloudY = cloud[index].y;
        });

        const startTime = performance.now();
        let pulseStarted = false;

        function frame(now) {
          const raw = Math.min((now - startTime) / IN_ANIMATION_DURATION_MS, 1);
          const t = easeInOutCubic(raw);

          if (!pulseStarted && raw > 0.74) {
            pulseStarted = true;
            startImagePulse();
          }

          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#000";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          drawBlocksFromCanvas(sourceCanvas, blocks, block => ({
            x: block.cloudX + (block.x - block.cloudX) * t,
            y: block.cloudY + (block.y - block.cloudY) * t
          }), 1);

          if (raw < 0.78) drawNoiseOverlay(1 - raw);

          if (raw < 1) {
            animationId = requestAnimationFrame(frame);
          } else {
            ctx.drawImage(sourceCanvas, 0, 0);
            if (!pulseStarted) startImagePulse();
            animationId = null;
            resolve();
          }
        }

        animationId = requestAnimationFrame(frame);
      });
    }

    function animatePixelMorph(oldCanvas, newCanvas) {
      return new Promise((resolve) => {
        const blocks = createBlocks(oldCanvas.width, oldCanvas.height);
        const cloud = shuffle(blocks.map(block => ({ x: block.x, y: block.y })));

        blocks.forEach((block, index) => {
          block.cloudX = cloud[index].x;
          block.cloudY = cloud[index].y;
        });

        const startTime = performance.now();
        let pulseStarted = false;

        function frame(now) {
          const raw = Math.min((now - startTime) / MORPH_ANIMATION_DURATION_MS, 1);

          if (!pulseStarted && raw > 0.74) {
            pulseStarted = true;
            startImagePulse();
          }

          // שלב אמצע רחב יותר: אין קפיצה בין פיקסלים של תמונה ישנה לחדשה.
          const oldMove = easeInOutCubic(clamp01(raw / 0.55));
          const newMove = easeInOutCubic(clamp01((raw - 0.38) / 0.62));
          const oldAlpha = clamp01(1 - (raw - 0.18) / 0.52);
          const newAlpha = clamp01((raw - 0.30) / 0.55);

          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#000";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          drawBlocksFromCanvas(oldCanvas, blocks, block => ({
            x: block.x + (block.cloudX - block.x) * oldMove,
            y: block.y + (block.cloudY - block.y) * oldMove
          }), oldAlpha);

          drawBlocksFromCanvas(newCanvas, blocks, block => ({
            x: block.cloudX + (block.x - block.cloudX) * newMove,
            y: block.cloudY + (block.y - block.cloudY) * newMove
          }), newAlpha);

          const cloudiness = raw < 0.5 ? raw * 2 : (1 - raw) * 2;
          drawNoiseOverlay(cloudiness * 0.75);

          if (raw < 1) {
            animationId = requestAnimationFrame(frame);
          } else {
            ctx.drawImage(newCanvas, 0, 0);
            if (!pulseStarted) startImagePulse();
            animationId = null;
            resolve();
          }
        }

        animationId = requestAnimationFrame(frame);
      });
    }

    function setRatingButtonsEnabled(enabled) {
      isWaitingForRating = enabled;
      ratingButtons.forEach(btn => btn.disabled = !enabled);
      ratingPanel.classList.toggle("visible", enabled);
    }

    async function loadNextSourceCanvas() {
      const nextFile = getNextImageFile();
      if (!nextFile) return null;
      currentFile = nextFile;
      const image = await loadImage(currentFile);
      resizeCanvasToDisplaySize();
      return createFittedImageCanvas(image);
    }

    async function startFirstTrial() {
      if (animationId) cancelAnimationFrame(animationId);
      stopImagePulse();
      hideGameOver();
      if (demoSignal && typeof hideDemoSignal === "function") hideDemoSignal();

      errorMessage.style.display = "none";
      setRatingButtonsEnabled(false);
      currentSourceCanvas = null;

      try {
        currentSourceCanvas = await loadNextSourceCanvas();
        if (!currentSourceCanvas) {
          showGameOver();
          return;
        }
        await animateScrambleIn(currentSourceCanvas);
        setRatingButtonsEnabled(true);
        isTransitioning = false;
      } catch (error) {
        console.error(error);
        drawEmptyCanvas();
        errorMessage.textContent = `לא נמצאה התמונה: ${currentFile}`;
        errorMessage.style.display = "block";
        isTransitioning = false;
        setTimeout(startFirstTrial, 1200);
      }
    }

    async function transitionToNextTrial() {
      if (animationId) cancelAnimationFrame(animationId);
      stopImagePulse();

      try {
        const oldCanvas = currentSourceCanvas;
        const nextCanvas = await loadNextSourceCanvas();

        if (!nextCanvas) {
          drawEmptyCanvas();
          showGameOver();
          return;
        }

        if (oldCanvas) {
          await animatePixelMorph(oldCanvas, nextCanvas);
        } else {
          await animateScrambleIn(nextCanvas);
        }
        currentSourceCanvas = nextCanvas;
        if (demoSignal && typeof hideDemoSignal === "function") hideDemoSignal();
        setRatingButtonsEnabled(true);
        isTransitioning = false;
      } catch (error) {
        console.error(error);
        drawEmptyCanvas();
        errorMessage.textContent = `לא נמצאה התמונה: ${currentFile}`;
        errorMessage.style.display = "block";
        isTransitioning = false;
        setTimeout(startFirstTrial, 1200);
      }
    }

    ratingButtons.forEach(button => {
      button.addEventListener("click", () => {
        const rating = Number(button.dataset.rating);
        handleRating(rating);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (hasFinishedExperiment) return;
      if (!isWaitingForRating || isTransitioning) return;
      if (!["1", "2", "3"].includes(event.key)) return;
      handleRating(Number(event.key));
    });

    window.addEventListener("resize", () => {
      drawEmptyCanvas();
      if (currentSourceCanvas && !isTransitioning && !isWaitingForRating) {
        ctx.drawImage(currentSourceCanvas, 0, 0);
      }
    });

    drawEmptyCanvas();


    let port = null;
    let writer = null;

    connectBtn.addEventListener("click", async () => {
      if (!("serial" in navigator)) {
        alert("הדפדפן לא תומך ב-Web Serial. השתמשי ב-Chrome או Edge.");
        return;
      }

      connectErrorMessage.style.display = "none";
      connectErrorMessage.textContent = "";
      connectBtn.disabled = true;

      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        const textEncoder = new TextEncoderStream();
        textEncoder.readable.pipeTo(port.writable);
        writer = textEncoder.writable.getWriter();

        connectScreen.style.display = "none";
        experimentScreen.style.display = "flex";
        resetDeck();
        hideGameOver();
        drawEmptyCanvas();
        startFirstTrial();
      } catch (error) {
        console.error("Connection error:", error);
        connectErrorMessage.textContent = "הוציאו וחברו שוב את כבל ה-USB של המיקרוביט ונסו להתחבר שנית";
        connectErrorMessage.style.display = "block";
        connectBtn.disabled = false;
      }
    });

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function sendCommandBurst(command, times = 15, intervalMs = 100) {
      if (!writer) return;
      for (let i = 0; i < times; i++) {
        await writer.write(command);
        if (i < times - 1) await sleep(intervalMs);
      }
    }

    async function handleRating(rating) {
      if (!isWaitingForRating || isTransitioning) return;
      stopImagePulse();
      setRatingButtonsEnabled(false);
      isTransitioning = true;

      const command = rating === 3 ? "S" : "C";
      try {
        await sendCommandBurst(command, 15, 100);
      } catch (error) {
        console.error("Send error:", error);
      }

      await transitionToNextTrial();
    }
    
  </script>
</body>
</html>
